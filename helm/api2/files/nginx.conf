server {
    listen 8080 default_server;
    server_name _;

    resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

    location / {
        client_max_body_size 50M;
        set $backend_addr "http://api.dynamic.svc.cluster.local:4000";

        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
    }
    # Reverse proxy everything beginning with '/api' to portal api
    location /api {
        client_max_body_size 50M;
        set $backend_addr "http://api.dynamic.svc.cluster.local:4000";

        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
    }

    # reverse proxy websocket for '/ws' to prometheus
    location /api/v1/ws {
        set $backend_addr "http://api.dynamic.svc.cluster.local:4000";
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy everything beginning with '/api' to portal api
    location /grafana {
        set $backend_addr "http://grafana.dynamic.svc.cluster.local:3000";

        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy everything beginning with '/elasticsearch' to portal api
    location /elasticsearch {
        set $backend_addr "http://elasticsearch.dynamic.svc.cluster.local:9200";

        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy everything beginning with '/docs' api docs 
    location /docs {
        set $backend_addr "http://api.dynamic.svc.cluster.local:4000/docs";

        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable caching for docs
        proxy_cache off;
    }
    # Reverse proxy everything beginning with '/logo'
    location /logo {
        set $backend_addr "http://api.dynamic.svc.cluster.local:4000/logo";

        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  

        # Disable caching for logo
        proxy_cache off;
    }

    # reverse proxy for '/metrics' to prometheus
    location /metrics {
        set $backend_addr "http://prometheus.dynamic.svc.cluster.local:9090";

        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable caching for metrics
        proxy_cache off;

    }
    # reverse proxy websocket for '/ws' to prometheus
    location /grafana/api/live/ws {
        set $backend_addr "http://grafana.dynamic.svc.cluster.local:3000";
        proxy_pass $backend_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # reverse proxy for image rendering
    location /render {
        set $backend_addr "http://renderer.dynamic.svc.cluster.local:8081";

        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable caching for image rendering
        proxy_cache off;
    }

    # reverse proxy for css
    location /code.css {
        set $backend_addr "http://api.dynamic.svc.cluster.local:4000/code.css";
        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable caching for css
        proxy_cache off;

    }

    # reverse proxy for js
    location /code.js {
        set $backend_addr "http://api.dynamic.svc.cluster.local:4000/code.js";
        proxy_pass $backend_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Disable caching for js
        proxy_cache off;
    }

    location /kafka-ui/ {
        proxy_pass http://kafka-ui.dynamic.svc.cluster.local:8080/kafka-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache off;
    }
}
