{{- if and .Values.ingress.enabled (eq .Values.ingress.className "gce") }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: grafana-backendconfig
spec:
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /grafana/api/health
    port: 3000
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: kafka-ui-backendconfig
spec:
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /kafka-ui/actuator/health
    port: 8080
{{- end }}
