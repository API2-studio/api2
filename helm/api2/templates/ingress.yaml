          - path: /api/v1/ws
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 4000
{{- end }}
{{- end }}
