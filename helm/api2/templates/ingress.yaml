                port:
                  number: 3000
          - path: /grafana/api/live/ws
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /elasticsearch
            pathType: Prefix
            backend:
              service:
                name: elasticsearch
                port:
                  number: 9200
          - path: /metrics
            pathType: Prefix
            backend:
