
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | nindent 8 }}
{{- end }}
      containers:
        - name: api
          image: {{ .Values.api.image }}
          ports:
            - containerPort: {{ .Values.api.port }}
{{- if or .Values.gcpCredentials.enabled .Values.api.extraSecretEnv }}
          env:
{{- if .Values.gcpCredentials.enabled }}
            - name: GCP_CREDENTIALS
              value: {{ printf "%s/%s" (trimSuffix "/" .Values.gcpCredentials.mountPath) .Values.gcpCredentials.fileName | quote }}
{{- end }}
{{- range .Values.api.extraSecretEnv }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .key }}
{{- end }}
{{- end }}
{{- if .Values.gcpCredentials.enabled }}
          volumeMounts:
            - name: gcp-credentials
              mountPath: {{ .Values.gcpCredentials.mountPath | quote }}
              readOnly: true
{{- end }}
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
{{- range .Values.api.extraEnvFromSecrets }}
            - secretRef:
                name: {{ . }}
{{- end }}
          resources:
{{- if .Values.api.resources }}
{{ toYaml .Values.api.resources | nindent 12 }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.api.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.api.probes.liveness.failureThreshold }}
      initContainers:
        - name: wait-for-es
          image: curlimages/curl:8.4.0
          command: ["sh", "-c", "until curl -fsS http://elasticsearch:9200/_cluster/health; do echo waiting for elasticsearch; sleep 3; done"]
{{- if .Values.gcpCredentials.enabled }}
      volumes:
        - name: gcp-credentials
          secret:
            secretName: {{ default .Values.gcpCredentials.secretName .Values.gcpCredentials.existingSecret }}
            items:
              - key: {{ .Values.gcpCredentials.key }}
                path: {{ .Values.gcpCredentials.fileName }}
{{- end }}
