namespace: api2

imagePullSecrets:
  - name: gitlab-registry

ingress:
  enabled: true
  className: traefik
  host: api.local
  includeHostlessRule: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web

traefik:
  enabled: true
  ingressClass:
    enabled: false
    isDefaultClass: true
    name: traefik
  providers:
    kubernetesCRD:
      enabled: false
    kubernetesIngress:
      enabled: true
      ingressClass: traefik
  startupProbe:
    httpGet:
      path: /ping
      port: 8080
      scheme: HTTP
    failureThreshold: 30
    periodSeconds: 5
    timeoutSeconds: 3
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
  livenessProbe:
    failureThreshold: 6
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: LoadBalancer

