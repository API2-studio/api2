namespace: api2

imagePullSecrets:
  - name: gitlab-registry

ingress:
  enabled: true
  className: traefik
  host: api.local
  includeHostlessRule: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web

traefik:
  enabled: true
  ingressClass:
    enabled: false
    isDefaultClass: true
    name: traefik
  providers:
    kubernetesCRD:
      enabled: false
    kubernetesIngress:
      enabled: true
      ingressClass: traefik
  startupProbe:
    httpGet:
      path: /ping
      port: 8080
      scheme: HTTP
    failureThreshold: 30
    periodSeconds: 5
    timeoutSeconds: 3
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
  livenessProbe:
    failureThreshold: 6
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: LoadBalancer

env:
  STORAGE_PROVIDER: gcp
  COMPOSE_PROJECT_NAME: dynamic
  POSTGRES_USER: postgres
  POSTGRES_HOST: database
  POSTGRES_PORT: "5432"
  POSTGRES_DB: canopus
  ADMIN_NAME: admin
  ADMIN_EMAIL: admin@api2.dev
  FILE_COPY_FOR_AVATAR: "true"
  SYSTEM_ID: 00000000-0000-0000-0000-000000000000
  OTP_APP_ENV_VAR_NAME: dynamic
  LOG_RETENTION_DAYS: "90"
  DATA_RETENTION_ID_DAYS: "3000"
  GCP_CREDENTIALS: ./secrets/application_default_credentials.json
  GOOGLE_CLIENT_EMAIL: api2-client@api2-mvp.iam.gserviceaccount.com
  ADMIN_AVATAR_PATH: "./priv/static/Icon 64.jpeg"
  GOOGLE_PROJECT_ID: api2-mvp
  GOOGLE_BUCKET_NAME: api2-mvp
  GOOGLE_BUCKET_URL: https://storage.googleapis.com/api2-mvp
  GOOGLE_BUCKET_PATH: api2-mvp
  GRAFANA_ORG_ID: "1"
  GRAFANA_DASHBOARD_ID: "1"
  GRAFANA_DASHBOARD_UID: "1"
  GRAFANA_HOST: http://grafana:3000
  GRAFANA_PORT: "3000"
  GCP_PROJECT_ID: api2-mvp
  GCP_BUCKET: api2-mvp
  GCP_BUCKET_URL: https://storage.googleapis.com/api2-mvp
  GCP_BUCKET_PATH: api2-mvp
  GCP_SCOPE: https://www.googleapis.com/auth/devstorage.full_control
  GCP_STORAGE_DIR: /uploads
  VUE_APP_API_BASE_URL: http://localhost:4000/api/v1
  VUE_APP_PROXY_BASE_URL: http://localhost:4000
  ELASTIC_USER: elastic
  ELASTIC_HOST: http://elasticsearch:9200
  ACCESS_TOKEN_TTL_IN_MINUTES: "2999"
  REFRESH_TOKEN_TTL_IN_MINUTES: "3000"
  USER_AUTH_TTL_IN_DAYS: "7"
  GRAFANA_UPLOAD_DASHBOARDS_ON_START: "true"
  GUARDIAN_TTL_IN_MINUTES: "3000"
  GUARDIAN_REFRESH_TTL_IN_MINUTES: "2999"
  ACCESS_TOKEN_TTL_IN_DAYS: "7"
  REFRESH_TOKEN_TTL_IN_DAYS: "7"
  ELASTIC_SEARCH_ENABLED: "true"
  RATE_LIMIT: "100"
  RATE_LIMIT_PERIOD: "60000"
  RATE_LIMIT_MESSAGE: "Computer says, no!."
  TARPIT_DELAY: "1000"
  TARPIT_MAX_DELAY: "60000"
  # Keep default fetch size conservative to avoid OOM on large tables.
  DEFAULT_LIMIT: "1000"
  DEFAULT_OFFSET: "0"
  COMPILE_ENDPOINTS_DEFAULT: "true"
  DELETE_STRATEGY_SOFT: "false"
  WORKFLOW_KAFKA_PORT: "29092"
  WORKFLOW_KAFKA_TOPIC: workflow_topic
  WORKFLOW_KAFKA_GROUP_ID: workflow_group
  KAFKA_BROKER_HOST: kafka
  KAFKA_BROKER_PORT: "29092"
  KAFKA_VERSION: "7.4.0"
  KAFKA_DISABLE_DEFAULT_WORKER: "false"
  KAFKA_SYNC_TIMEOUT: "5000"
  KAFKA_MAX_RETRIES: "3"
  KAFKA_BROKER_URL: kafka:29092
  KAFKA_BROKER_SSL: "false"
  COMPILE_OPPOSITE_RELATIONS: "true"

