elasticsearch:
  image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
  storage: 50Gi
  resources:
    limits:
      cpu: "1"
      memory: 3Gi
    requests:
      cpu: "250m"
      memory: 1500Mi
  javaOpts: "-Xms768m -Xmx768m"
