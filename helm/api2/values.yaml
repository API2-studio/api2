zookeeper:
  image: confluentinc/cp-zookeeper:7.4.0
  storage: 5Gi
  # Keep Kafka/Zookeeper persistence strategy aligned to avoid cluster ID mismatch.
  persistence:
    enabled: false
  # Forces a new StatefulSet pod template hash on each helm upgrade.
  redeployOnUpgrade: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

kafka:
  image: confluentinc/cp-kafka:7.4.0
  storage: 10Gi
  # Keep Kafka/Zookeeper persistence strategy aligned to avoid cluster ID mismatch.
  persistence:
    enabled: false
  # Forces a new StatefulSet pod template hash on each helm upgrade.
  redeployOnUpgrade: true
  brokerId: 1
  listeners: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092"
  advertisedListeners: "PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092"
  heapOpts: "-Xmx512m -Xms512m"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

kafkaUi:
  image: provectuslabs/kafka-ui:latest
  storage: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

api:
  image: api2studio/canopus-api:1.0.1
  port: 4000
  replicas: 1
  probes:
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 6
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

prometheus:
  image: prom/prometheus
  storage: 10Gi

grafana:
  image: grafana/grafana-enterprise
  storage: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

loki:
  image: grafana/loki:3.1.1
  storage: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

promtail:
  image: grafana/promtail:3.1.1

renderer:
  image: grafana/grafana-image-renderer:latest
  storage: 2Gi
