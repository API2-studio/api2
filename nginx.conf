server {
    listen 8080 default_server;
    server_name prod.local staging.local localhost;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://api:4000;
        proxy_cache off;
    }

    location /api {
        proxy_pass http://api:4000;
    }

    location /docs {
        proxy_pass http://api:4000/docs;
        proxy_cache off;
    }

    location /logo {
        proxy_pass http://api:4000/logo;
        proxy_cache off;
    }

    location /code.css {
        proxy_pass http://api:4000/code.css;
        proxy_cache off;
    }

    location /code.js {
        proxy_pass http://api:4000/code.js;
        proxy_cache off;
    }

    location /elasticsearch {
        proxy_pass http://elasticsearch:9200;
    }

    location /metrics {
        proxy_pass http://prometheus:9090;
        proxy_cache off;
    }

    location /grafana/api/live/ws {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000/;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location /render {
        proxy_pass http://renderer:8081;
        proxy_cache off;
    }

    location /kafka-ui/ {
        proxy_pass http://kafka-ui:8080/kafka-ui/;
    }

    location = /kafka-ui {
        return 301 /kafka-ui/;
    }

    location /loki/ {
        proxy_pass http://loki:3100/;
    }
}
